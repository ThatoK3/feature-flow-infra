# ============================================================
# Healthcare Data Platform with Kafka + Debezium CDC + MySQL
# ============================================================

services:

  # ---------- Zookeeper ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: healthcare-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - spark-jupyter-scala_spark-net

  # ---------- Kafka ----------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: healthcare-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - spark-jupyter-scala_spark-net

  # ---------- AKHQ (Kafka UI) ----------
  akhq:
    image: tchiotludo/akhq:latest
    container_name: healthcare-akhq
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka:
              properties:
                bootstrap.servers: "kafka:29092"
    ports:
      - "8080:8080"
    networks:
      - spark-jupyter-scala_spark-net

  # ---------- MongoDB (Replica Set) ----------
  mongodb:
    image: mongo:6.0
    container_name: healthcare-mongodb
    restart: unless-stopped
    command: >
      mongod --replSet rs0 --bind_ip_all
      --keyFile /etc/mongo/keyfile --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: healthcare
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
      - ./data:/data/import
      - ./mongo-keyfile:/etc/mongo/keyfile:ro
    networks:
      - spark-jupyter-scala_spark-net
    healthcheck:
      test: ["CMD", "mongosh", "-u", "$MONGO_INITDB_ROOT_USERNAME", "-p", "$MONGO_INITDB_ROOT_PASSWORD", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5

  # One‑shot: initialise MongoDB replica set
  mongo-rs-init:
    image: mongo:6.0
    container_name: healthcare-mongo-rs-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    entrypoint: >
      bash -c "
        echo 'Waiting for MongoDB to be ready...' &&
        sleep 5 &&
        mongosh --host mongodb -u $$MONGO_ROOT_USER -p $$MONGO_ROOT_PASSWORD --authenticationDatabase admin --eval '
          if (!rs.status().ok) {
            rs.initiate({_id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }]});
            print(\"Replica set initiated.\");
          } else {
            print(\"Replica set already initialised.\");
          }
        '
      "
    networks:
      - spark-jupyter-scala_spark-net

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:15
    container_name: healthcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=10
        -c max_wal_senders=10
        -c hot_standby=on
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
      - ./data:/data/import
    networks:
      - spark-jupyter-scala_spark-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d healthcare"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- MS SQL Server ----------
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healthcare-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
      MSSQL_AGENT_ENABLED: "true"   # Required for CDC
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./mssql-init:/docker-entrypoint-initdb.d
      - ./data:/data/import
    networks:
      - spark-jupyter-scala_spark-net
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------- MySQL ----------
  mysql:
    image: mysql:8.0
    container_name: healthcare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: healthcare
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - "--server-id=1"
      - "--log-bin=mysql-bin"
      - "--binlog-format=ROW"
      - "--binlog-row-image=FULL"
      - "--gtid-mode=ON"
      - "--enforce-gtid-consistency=ON"
      - "--binlog-expire-logs-seconds=604800"   # 7 days
      - "--max-binlog-size=512M"
      - "--sync-binlog=1"
      - "--innodb-flush-log-at-trx-commit=1"
      - "--transaction-isolation=READ-COMMITTED"
      - "--log-slave-updates=ON"
      - "--relay-log=mysql-relay-bin"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
      - ./data:/data/import
    networks:
      - spark-jupyter-scala_spark-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ---------- Debezium Connect ----------
  connect:
    image: debezium/connect:2.5
    container_name: healthcare-debezium-connect
    restart: unless-stopped
    depends_on:
      - kafka
      - mongodb
      - postgres
      - mssql
      - mysql
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      ENABLE_DEBEZIUM_SCRIPTING: "true"
    ports:
      - "8083:8083"
    volumes:
      - ./debezium-connectors:/kafka/connect/debezium-connectors   # optional
    networks:
      - spark-jupyter-scala_spark-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------- Connector Registrar (one‑shot) ----------
  register-connectors:
    image: curlimages/curl:latest
    container_name: healthcare-register-connectors
    restart: "no"
    depends_on:
      connect:
        condition: service_healthy
    networks:
      - spark-jupyter-scala_spark-net
    volumes:
      - ./debezium-connectors:/connectors:ro
    entrypoint: >
      sh -c "
        sleep 10;
        for file in /connectors/*.json; do
          echo \"Registering $$(basename $$file .json)\";
          curl -X POST -H 'Content-Type: application/json' --data @$$file http://connect:8083/connectors;
        done
      "

  # ---------- MinIO ----------
  minio:
    image: minio/minio:latest
    container_name: healthcare-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - spark-jupyter-scala_spark-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: healthcare-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - spark-jupyter-scala_spark-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  postgres_data:
  mssql_data:
  mysql_data:
  minio_data:
  redis_data:

networks:
  spark-jupyter-scala_spark-net:
    external: true
